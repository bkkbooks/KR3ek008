成立消潰瘍若膿潰後二便仍閉者毒未解也清熱消毒湯熱退而渴不退津液不足也八珍加麥冬熱不止腫痛反甚虛熱內作也保元湯清心淨血之品熱退肌肉不生十全大補瘡白下陷寒氣烈也五味異功手足並冷六君子加薑桂等骨槽風清胃散牛蒡解肌湯又方鮮石斛元參羚羊角牙漏玉女煎牙咬牙宣牙疳清胃散玉女煎犀角地黃湯涼膈飲牛蒡解肌湯蘆薈消毒飲又方鮮石斛炒山梔元參桑葉杏仁花粉連翹薄荷麥冬雪梨汁荊芥羚羊角淡芩淡豆豉栝蔞忍冬藤鮮薄荷根牙菌牙岩犀角地黃湯甘露飲玉女煎瀉黃散清胃散加石決明走馬牙疳犀角地黃湯又方鮮石斛荊芥元參前胡忍冬藤牛蒡連翹葛根豆豉薄荷六一散香薷蟬衣青蒿黑梔丹皮白薇茅根肺癰腸癰方竹燈臺一隻燒紅時悶息之研為細末陳酒送下癰疽煎方金銀花六兩甘草二兩皂角刺五錢水酒煎一劑立消乳癰方白芷貝母八兩為末酒服之疔瘡初起白芷生薑一兩擂酒一盞溫服喉症方鮮竹葉一把煎湯常服重症鮮石斛五錢半醋少許冷飲口舌瘡方黃柏一錢殭蠶一錢枳殼灰五分炙草末五分薄荷末五分冰片三釐山豆根五分各為末一日拌三次明日愈中焦統治方金銀花元參生草白芍炒梔子荊芥連翹桑寄子如屬陰去梔子加桂末下焦統治方天花粉三錢生草二錢銀花三錢蒲公英五錢上下統治方生甘草二錢蒲公英一兩黃芩一錢銀花三錢煎乳香沒藥各一錢調服上消癰毒散金銀花一兩當歸一兩川芎五錢蒲公英三錢生甘草五錢桔梗三錢黃芩一錢荊芥一錢連翹二錢牛蒡一錢半芙蓉葉一片上中下皆治方金銀花四兩蒲公英一兩當歸三兩元參一兩疹痧方草麻三錢元參一兩乾葛二兩青蒿二兩黃耆三兩喉痛方生地一兩粉丹皮四錢白芍二錢麥冬六錢川貝三錢甘草三錢元參五錢薄荷二錢青果五個打乳岩方初生可治青皮石膏行汙生甘草節消腫導毒栝蔞橘絡行經絡皂角刺銀花此症不可用刀因寒痰結凝當用陽和湯外敷宜留意不可寒涼乳癰方金銀花五錢白芍二錢青皮一錢蜜耆三錢柴胡一錢連翹一錢半當歸三錢蒲公英五錢生草一錢鮮橘葉十片砂仁末沖四分又方加浙貝白芷靈仙夏枯草天冬肺癰方元參八錢麥冬八錢生草一錢銀花一兩女人羞隱治方白芍三錢川芎一錢熟地五錢當歸三錢甘草一錢柴胡一錢白芥四錢黃芩三分炮姜三分症熱加梔子三錢又方痛癢兼治當歸五錢梔子三錢白芍五錢柴胡一錢茯苓五錢楝樹根五分有火加黃芩一錢有寒加桂一錢
