body:
  text: 冰梅丸治咽喉風痰緊閉不能言語紅腫疼痛用之立效大青時梅二十個大梅片一錢川雅連一錢西瓜霜二錢硼砂一錢半水飛青黛一錢細薄荷一錢半苦甘草一錢荊芥穗二錢象貝去心四錢制殭蠶四錢淡黃芩鹽水炒一錢半上雄精三錢製半夏三錢上十三味各研細末將大青梅去核納以明礬放瓦上煅至礬枯去礬將梅肉搗爛和上藥末為丸如龍眼核大以瓷瓶收貯臨症用一丸放舌上化下為度陽和丸上桂心一兩麻黃五錢炮薑炭五錢共為細末灑水為丸新增白芥子三錢鹿角霜五錢西黃丸治乳癰瘰癧痰核流注肺癰小腸癰毒等每服三錢陳酒送下上部臨臥服下部空心服炙淨乳香沒藥各一兩麝香一錢半西牛黃三分雄精五錢上藥共研末取飯一兩打爛入末藥再打為丸如蘿蔔子大曬乾忌烘每服三錢熱陳酒送下醉蓋取汗酒醒癰消痛息琥珀蠟丸治癰疽發背已成未膿之際恐毒氣不能外出必致內攻預服此丸護膜護心散血解毒功效甚大每服在日晚三十丸白湯送甚者日二次白明礬一兩五錢黃蠟一兩雄黃一錢二分琥珀一錢另研極細硃砂一錢二分蜂蜜二錢先將礬雄珀砂四味先研細末再將蜜蠟入銅勺內溶化離火片時四邊稍凝入上藥末攪勻共成一塊以一人將藥火上微烘衆人急丸如小緑豆子大用硃砂為衣瓷罐收貯三黃丸治懸癰紅腫熱毒疼痛大癰楊梅廣瘡結毒等症速服十次甚險全愈熟大黃三兩乳香沒藥去淨油各二兩雄精五錢麝香一錢五分西黃三分新增雅連三錢淡芩酒拌曬乾一兩先將熟大黃酒浸透入碗隔湯蒸軟搗爛然後以乳香沒藥雄麝犀五味末和入再打千捶為丸如梧子大每服五錢通聖丸治一切陽毒小兒禿瘡防風桔梗麻黃去節甘草各一兩當歸川芎酒炒滑石各一兩白芍酒炒石膏煨白朮土炒芒硝酒浸焙乾連翹黃芩酒炒黑梔薄荷荊芥各二錢五分共為細末水泛為丸如緑豆大蛇咬解毒丸甚效白礬一兩甘草五錢雄黃一兩三七一兩白芷一兩青木香五錢川貝一兩五靈脂一兩硃砂一錢共為細末飯糊為丸硃砂為衣金龍丸治一切疔腫並跌僕損傷筋攣貼骨癰疽兼治男婦大小頭項瘰癧及乳串流核痰氣滯凝痘後發癰番木鱉四兩以米泔水浸三日刮去毛皮切曬麻油炒透甲片一兩五錢炒斷絲共為末以黃米飯搗勻為丸桐子大每服五分量人酌減按部位用引經藥煎湯送下宜暖睡勿冒風如冒風覺周身麻木或發抖不必驚慌過片時即安初起一二服即消已成膿者服此自能出毒不必咬頭開刀誠外科家第一妙方也引經頭面川芎五分羌活五分腰間杜仲五分足膝牛膝五分木瓜五分肩背角針五分兩臂桂枝五分兩脅柴胡五分咽頭桔梗五分甘草五分跌僕紅花五分歸身五分年老氣血衰只服四分新産半月內只服四分滿月服五分男婦瘰癧痰毒夏枯草湯服或酒送小兒周歲以內服九粒周歲以外服十一粒三歲服十五粒四五歲服十九粒六七歲服二十一粒八九歲服三十一粒十歲服三分十五歲服四分二十歲照大人服法小兒不能吞服以開水送或甜酒調化送下五龍丸即散流注丸治半陰半陽及眼癰魚口便毒鶴膝風症甲片土炒全蠍酒炒槐末炒殭蠶炙土貝母研各一兩麵糊為丸每服三錢陳酒送下自制霹靂丸專治一切吐瀉冷麻痧桂枝三兩川椒二兩五錢良薑五錢乾薑一兩半苡仁二兩五錢小茴香二兩公丁香二兩防己一兩五錢降香二兩五錢附子一兩五錢蔥白頭二兩檳榔二兩烏藥一兩五錢木香二兩蓽澄茄二兩草果一兩吳萸一兩菖蒲一兩細辛一兩生曬研末水泛為丸每服三錢開水送下小兒減半孕婦忌服琥珀射星丸治痰迷心竅辰砂琥珀射干真陳膽星各一錢研細末用豬心血和丸金箔為衣如小梧桐子大回陽散治癰疽陰瘡皮色不變漫腫無頭堅硬疼痛風痹腳氣手足麻木筋骨不舒寒熱流注鶴膝風等一概敷之煨姜三兩肉桂五錢赤芍炒三兩南星一兩草烏炒三兩白芷一兩共為細末以熱酒調敷拔疔散治一切疔瘡以膏蓋之未膿即散或用荔枝肉打爛敷之亦效月石一錢雄精二錢千金霜一錢巴散二錢鐵鏽二錢活磁石炒五錢麝香三分梅片二分硃砂五分蟾酥三分研極細以瓷瓶收貯黑虎散治一切無名腫毒以膏蓋之麝香五分梅片五分公母丁香各二錢蜈蚣七條大全蠍七個穿山甲七片大蜘蛛七個以瓦焙加硇砂三分更妙共為細末用瓷石器收貯金黃散治癰疽發背諸般疔瘡跌僕濕痰流注大頭時腫漆瘡火丹風熱天泡肌膚亦腫乾溼腳氣婦女乳癰小兒丹毒等天花粉一兩黃柏五兩薑黃大黃各五錢白芷五錢紫川朴陳皮甘草蒼朮各二兩天南星二兩曬乾為末以瓷器收貯凡遇紅腫及夏月火令時用茶湯同蜜水調敷如微熱欲作膿者以蔥湯同蜜水調敷如漫腫無頭皮色不變附骨癰疽鶴膝等俱以蔥酒並調如天泡火赤遊丹黃水瘡俱以板藍根葉搗汁調和燙傷麻油調其次諸引又在臨用之際順合天時調窺病勢也麝香散川草烏各二錢細辛二錢肉桂二錢麝香五分乳香五分沒藥五分丁香二錢附子二錢雄麝散治一切癰疽發背初潰時用之化腐定痛之要藥也楊梅初方頂字麝香三錢真雄精五錢淨巴霜三錢上研細末將瓷器收貯勿令出氣二味拔毒散治風濕諸腫痛癢疥瘡雄精明白礬各等分為細末用茶調以鵝翎蘸掃患上四虎散治癰疽硬腫厚如牛領之皮不作膿腐用此甚效天南星草烏半夏狼毒各等分細研用豬腦子同搗敷留頂出氣鐵箍散治發背將潰已潰時根腳走散不收透者用此銅緑五錢明礬四錢膽礬三錢五倍子微炒一兩白芨五錢輕粉鬱金各二錢麝香三分研細末用陳米醋一碗勺內慢火熱至一小杯候起金色為度待溫用上藥末攪入膏內每用燉溫用新筆塗以棉紙蓋上根自全收不散推車散去多骨又治瘡出血香油調蜣螂蟲煅存性為末摻於骨上骨自出移毒消腫散生於骨際及膝上不急治難以收功以此藥移之紫槿皮炒五兩赤芍炒一兩香白芷一兩曬燥不可炒石菖蒲一兩曬不可炒獨活炒一兩五錢共為細末以好酒和蔥白五莖煎滾調搽不必留頂一日一換以消為度追瘡散用治一切瘡痍疥癩大黃石膏黃柏蛇床子各五錢硫黃七分明礬二錢樟冰八分金爐底三分椒目二分共為細末用桐油調搽新增苦參人中黃勝金散好醋塗痛患消又治刀傷吐衄調服臺參野山膝各一兩研極細末螵蛸散治破爛諸瘡海螵蛸人中白煅各一兩共為細末摻之神效退管散豬肺管兩個不可傷將管上油膜去淨以瓦焙乾鵝管石一錢白砒四分槍硝三分共為細末以白掃蔥水麵漿為藥條插入管內如此三次其管退出平瘡散專治白泡瘡膿窠肥瘡痛癢立效寒水石二兩東丹一兩掃盆一錢硫黃五錢明礬七錢川椒一錢黃柏五錢牛煙膠五錢人中黃二錢為細末以板豬油雞腳大黃根同打爛擦立效截瘡散治一切疥癩膿窠諸瘡嫩松香一兩雄精一錢共為細末入竹瀝紙捲成條浸菜油一宿取出倒掛火燒滴油塗之即愈枯礬散治一切風火開痰閉吹之立效加麝香少許更妙枯礬一錢制蠶一錢硼砂三分薄荷三分大梅片一分雄精一錢加膽礬一分山豆根二分苦甘草一分研吹喉散治纏喉風痹乳蛾喉痹重舌等吹之神效殭蠶薄荷青黛朴硝白礬火硝黃連硼砂各五錢共為細末以豬膽七個袋之埋於土下久之取出搗爛干為末柳青散治口舌破碎先用薔薇根湯漱口後吹之薄荷五分兒茶八分黃連四分青黛三分冰片一分共為細末金烏散治頭耳眉癬燕窩瘡皂莢炭一兩枯白礬一錢共為細末香油調敷天瘡散治天泡瘡滑石一兩粉草五錢枯礬三錢緑豆粉五錢共為細末吹耳散治耳疳膿水不止水龍骨煅一錢海螵蛸一錢飛青黛一錢枯礬三分五倍子炒黃一錢黃魚齒煅五分細薄荷五分梅片三分川雅連三分蛀竹屑三分石榴花瓣炙脆一錢為末必細末平安散即烏龍散去胬肉烏梅一兩煅存性為末摻之又方膽礬燒敷上代刀散去頑肉亦可代開刀金頂砒五分潮腦一錢螺螄肉曬乾二兩輕粉三錢巴豆仁去油五錢為末用麻油調搽硇砂散治鼻痔耳挺及菌硇砂一錢輕粉三分冰片五分雄黃三分共為細末每日點五六次漸漸化水為愈五龍散治癰疽疔毒瘰癧初起調塗火盛以芙蓉汁調寒重用薑汁調生南星一兩生半夏五錢全當歸五錢生大黃五錢陳小粉一斤四兩炒黑共為細末聖金散治咽喉紅腫痛微碎痰涎喉痹等吹之淡秋石三錢淡黃芩一錢半川雅連五分滴乳香一錢真西黃一分燈心炭五釐薄荷頭三分大梅片三分共為細末吹之中白散治喉中腐爛人中白一兩兒茶五錢黃柏三錢薄荷一錢半青黛三分大梅片二分半研為末清陽散治咽喉腫痛脹痛紅腫月石飛青砂各二錢大梅片一分半上藥研為末清涎散專治牙痛月石一兩元明粉三錢大梅片三分平安散與前別散膏用專消火症痰核牛黃二分火硝三錢煅月石三錢雄黃三錢原寸香三分大梅片二分清涼散此藥未注大約用火症熟石膏一兩黃柏二錢為末涼血散專長肉收功熟石膏一兩黃丹二錢為末生肌散滑石一兩冰片二分硃砂一錢為末清陽柳華散治咽喉一切紅腫黃柏一兩青黛一兩月石一兩人中白煅一兩為末牛黃冰連散專治未注大約亦咽喉藥也牛黃一分黃連二錢冰片一分為末丁桂散治頭痛在傷膏內用之神效也丁香三錢肉桂一兩為末姜芷散專治火濕毒薑黃白芷各一斤為末清涼膏桐油一斤菜油一斤鉛粉一兩頭髮散瘀血四兩熬至發盡入丹收膏先發油燒燒至化後鉛粉和入再用丹收陽和解凝膏專治寒症附子桂枝官桂大黃歸身川烏烏地龍殭蠶赤芍白芷白蘞白芨各二兩續斷防風荊芥五靈脂木香二團陳皮鮮牛蒡草三斤活白鳳仙花梗四兩麻油十斤先將牛蒡鳳仙二味入油煎枯去渣再將上藥入煎至枯瀝渣隔宿油冷見過斤兩每斤油加炒黃丹七兩攪勻文火熬至滴水成珠為度以油鍋移陽處再以乳香沒藥各二兩細研蘇合香四兩麝香一兩入膏攪勻半月後攤貼背疽夾青炙乳香炙沒藥銀硃黃丹血竭兒茶各一兩銅緑八分共為細末化腐丹紅升藥一斤銅緑八錢石膏一斤煅炙乳沒各三兩二錢降藥一兩八錢上為細末以瓷器藏九一丹拔毒生肌尿浸石膏九兩三仙丹一兩共為細末摻之赤靈丹治疔毒腐毒不透敷之立起上血竭一錢月石一兩為末三黃丹治風毒黃水瘡大黃三兩黃柏一兩黃連三錢石膏煅二兩爐底少許共研川連水調敷金素丹治背疽腐肉黑黯死肌臭氣難聞以此摻之生明礬六錢枯礬三錢腰黃一錢共為細末如霜黑龍丹去突出肉治陰虛或脫肛以此摻之先用防風升麻各一錢煎湯調搽立收入熟地炒炭一兩烏梅炙三錢為末摻蛭蟾丹治漏管蠣蝗十條以泥封罐納入炭火煅之蟾酥一錢熊膽八分麝香五分冰片二分共為細末飯糊為條插入其管退後用生肌藥蟾酥散蟾酥一錢沒藥炒四錢乳香炙二錢甲片一錢蜈蚣二錢雄黃二錢麝香五分川草烏各二錢藤黃二錢為末補脬丹治産後尿胞傷損白牡丹根一錢黃絹一尺白芨一錢煎濃半碗徐服之後忌言語八寶丹一切不收口可摻大濂珠同豆腐煮過三錢真青龍骨一兩上血竭嫩兒茶各一兩石膏童便浸百日漂二兩西血珀五錢上浮甘石煅二兩雞內金炙一兩共為細末如霜瓷瓶藏貯四寶丹治臁瘡川黃柏赤石脂大貝母去心青黛飛共為細末摻之黑虎丹治一切無名腫毒同膏貼麝香五分頂梅片五分公母丁香各一錢蜈蚣大七條靈磁石煅一錢半大全蠍七個炙甲片七片大蜘蛛煅七個制蠶七條紅