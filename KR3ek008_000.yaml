front:
  text: 序余素不習外科壬辰歲初就鄧羹和先生讀內科書知其胞侄星伯從孟河馬培之徵君徵君擅長外科有方書備載外科諸方即傳薪集也許恆氏曾從星伯君學故得是書余向之假録一過什襲藏之會丁酉家慈背患搭手重如負數千錢因家境艱難未延專科治自外敷出毒收口止均將此書檢方用藥化重為輕幸而獲痊故將得書緣由識之如上無錫周鎮小農別署伯華識
  hash: sha256:80c27c8176405d7849a3c39559ab56f77758da62a82beca7bdb2094d4115dd34
